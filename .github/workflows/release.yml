name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (example: v0.0.2)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: |
          bun run lint
          bun run typecheck
          bun run test

  release_notes:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Generate release notes
        run: bun run release:notes -- --version "${{ inputs.version }}" --output dist/release/release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release/release-notes.md

  build_release:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platformTarget: darwin-arm64
            compileTarget: bun-darwin-arm64
            runsOn: macos-26
          - platformTarget: linux-x64
            compileTarget: bun-linux-x64
            runsOn: ubuntu-latest
          - platformTarget: linux-arm64
            compileTarget: bun-linux-arm64
            runsOn: ubuntu-24.04-arm
    runs-on: ${{ matrix.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release assets
        run: |
          bun run app:clean
          bun run app:build
          bun run bundle:verify

      - name: Package standalone artifact
        run: |
          bun run release:package -- --version "${{ inputs.version }}" --output-root "dist/release/${{ matrix.platformTarget }}" --target "${{ matrix.compileTarget }}"

      - name: Smoke test packaged artifact
        run: |
          bun run release:smoke -- --artifact-root "dist/release/${{ matrix.platformTarget }}/trenchclaw-${{ matrix.platformTarget }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platformTarget }}
          path: dist/release/${{ matrix.platformTarget }}

  publish:
    needs:
      - build_release
      - release_notes
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body_path: dist/release/release-notes.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/release/**/*.tar.gz
            dist/release/**/*.sha256
            dist/release/release-notes.md
            dist/release/**/release-metadata*.json
