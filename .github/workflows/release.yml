name: Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release mode
        required: true
        type: choice
        default: patch
        options:
          - manual
          - patch
          - minor
      release_notes_mode:
        description: "Manual only: auto = repo-generated full commit log; draft = releases/<version>.md plus auto commit log"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - draft

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_plan.outputs.release_tag }}
      prerelease: ${{ steps.release_plan.outputs.prerelease }}
      package_version: ${{ steps.release_plan.outputs.package_version }}
      release_notes_mode: ${{ steps.release_plan.outputs.release_notes_mode }}
      release_notes_path: ${{ steps.release_plan.outputs.release_notes_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release plan
        id: release_plan
        run: |
          RELEASE_MODE="${{ github.event.inputs.release_mode }}"
          RELEASE_NOTES_MODE="${{ github.event.inputs.release_notes_mode }}"
          case "$RELEASE_MODE" in
            manual)
              bun run release:validate -- --github-output "$GITHUB_OUTPUT"
              PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
              case "$RELEASE_NOTES_MODE" in
                draft)
                  BODY_PATH="releases/${PACKAGE_VERSION}.md"
                  if [ ! -f "$BODY_PATH" ]; then
                    echo "Missing drafted release notes: $BODY_PATH" >&2
                    exit 1
                  fi
                  echo "release_notes_mode=draft" >> "$GITHUB_OUTPUT"
                  echo "release_notes_path=$BODY_PATH" >> "$GITHUB_OUTPUT"
                  ;;
                auto)
                  echo "release_notes_mode=auto" >> "$GITHUB_OUTPUT"
                  echo "release_notes_path=" >> "$GITHUB_OUTPUT"
                  ;;
                *)
                  echo "Unsupported manual release notes mode: $RELEASE_NOTES_MODE" >&2
                  exit 1
                  ;;
              esac
              ;;
            patch|minor)
              bun run version:next -- --strategy "$RELEASE_MODE" --github-output "$GITHUB_OUTPUT"
              NEXT_TAG="$(awk -F= '/^next_tag=/{print $2}' "$GITHUB_OUTPUT" | tail -n1)"
              NEXT_VERSION="$(awk -F= '/^next_version=/{print $2}' "$GITHUB_OUTPUT" | tail -n1)"
              bun run release:validate -- --version "$NEXT_TAG" --prerelease false
              RELEASE_TAG="$NEXT_TAG"
              PACKAGE_VERSION="$NEXT_VERSION"
              echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
              echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "release_notes_mode=auto" >> "$GITHUB_OUTPUT"
              echo "release_notes_path=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release mode: $RELEASE_MODE" >&2
              exit 1
              ;;
          esac

      - name: Validate release tag
        run: |
          bun run release:validate -- --version "${{ steps.release_plan.outputs.release_tag }}" --prerelease "${{ steps.release_plan.outputs.prerelease }}"

      - name: Validate workspace
        run: |
          bun run lint
          bun run typecheck
          bun run test

      - name: Apply auto version bump
        if: ${{ github.event.inputs.release_mode == 'patch' || github.event.inputs.release_mode == 'minor' }}
        run: |
          TRENCHCLAW_ALLOW_VERSION_WRITE=1 bun run version:apply -- --strategy "${{ github.event.inputs.release_mode }}"

      - name: Commit auto version bump
        if: ${{ github.event.inputs.release_mode == 'patch' || github.event.inputs.release_mode == 'minor' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${{ steps.release_plan.outputs.release_tag }}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create release tag
        run: |
          git tag "${{ steps.release_plan.outputs.release_tag }}"
          git push origin "${{ steps.release_plan.outputs.release_tag }}"

  build_release:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platformTarget: darwin-arm64
            compileTarget: bun-darwin-arm64
            runsOn: macos-26
          - platformTarget: linux-x64
            compileTarget: bun-linux-x64
            runsOn: ubuntu-latest
          - platformTarget: linux-arm64
            compileTarget: bun-linux-arm64
            runsOn: ubuntu-24.04-arm
    runs-on: ${{ matrix.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release assets
        run: |
          bun run app:clean
          bun run app:build -- --version "${{ needs.prepare_release.outputs.release_tag }}"
          bun run bundle:verify

      - name: Package standalone artifact
        env:
          TRENCHCLAW_RELEASE_SKIP_SMOKE: "1"
        run: |
          bun run release:package -- --version "${{ needs.prepare_release.outputs.release_tag }}" --output-root "dist/release" --target "${{ matrix.compileTarget }}"

      - name: Smoke test packaged artifact
        run: |
          bun run release:smoke -- --artifact-path "dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.tar.gz"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platformTarget }}
          path: |
            dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.tar.gz
            dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.tar.gz.sha256
            dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.release-metadata.json

  publish:
    needs:
      - prepare_release
      - build_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Write GitHub release body (full commit log)
        if: ${{ needs.prepare_release.outputs.release_notes_mode == 'auto' }}
        run: |
          mkdir -p dist/release
          bun run release:notes -- \
            --version "${{ needs.prepare_release.outputs.release_tag }}" \
            --output dist/release/github-release-body.md

      - name: Write GitHub release body (draft markdown + full commit log)
        if: ${{ needs.prepare_release.outputs.release_notes_mode == 'draft' }}
        env:
          DRAFT_PATH: ${{ needs.prepare_release.outputs.release_notes_path }}
        run: |
          mkdir -p dist/release
          bun run release:notes -- \
            --version "${{ needs.prepare_release.outputs.release_tag }}" \
            --template changelog-only \
            --output dist/release/_release-changelog.md
          {
            cat "$DRAFT_PATH"
            echo ""
            echo "---"
            echo ""
            echo "## Auto-generated commit log"
            echo ""
            echo "_Grouped summary uses conventional-commit-style prefixes where present; the appendix lists every commit with full message bodies._"
            echo ""
            cat dist/release/_release-changelog.md
          } > dist/release/github-release-body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          name: ${{ needs.prepare_release.outputs.release_tag }}
          body_path: dist/release/github-release-body.md
          prerelease: ${{ needs.prepare_release.outputs.prerelease }}
          files: |
            dist/release/*.tar.gz
            dist/release/*.sha256
            dist/release/*.release-metadata.json
