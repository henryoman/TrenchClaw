name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (example: v0.0.2)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: |
          bun run test

      - name: Build app bundle
        run: |
          bun run app:clean
          bun run app:build
          bun run bundle:verify

      - name: Package release artifact
        run: bun run release:package -- --version "${{ inputs.version }}"

      - name: Generate release notes
        run: bun run release:notes -- --version "${{ inputs.version }}" --output dist/release/release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body_path: dist/release/release-notes.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/release/*.tar.gz
            dist/release/*.sha256
            dist/release/release-notes.md
            dist/release/release-metadata.json
