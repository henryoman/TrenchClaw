name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.next_version.outputs.next_tag }}
      prerelease: ${{ steps.next_version.outputs.prerelease }}
      package_version: ${{ steps.next_version.outputs.next_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve next version
        id: next_version
        run: |
          bun run version:next -- --github-output "$GITHUB_OUTPUT"

      - name: Validate release tag
        run: |
          bun run release:validate -- --version "${{ steps.next_version.outputs.next_tag }}" --prerelease "${{ steps.next_version.outputs.prerelease }}"

      - name: Validate workspace
        run: |
          bun run lint
          bun run typecheck
          bun run test

      - name: Apply release version
        run: |
          TRENCHCLAW_ALLOW_VERSION_WRITE=1 bun run version:apply

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${{ steps.next_version.outputs.next_tag }}"
          git tag "${{ steps.next_version.outputs.next_tag }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ steps.next_version.outputs.next_tag }}"

  build_release:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platformTarget: darwin-arm64
            compileTarget: bun-darwin-arm64
            runsOn: macos-26
          - platformTarget: linux-x64
            compileTarget: bun-linux-x64
            runsOn: ubuntu-latest
          - platformTarget: linux-arm64
            compileTarget: bun-linux-arm64
            runsOn: ubuntu-24.04-arm
    runs-on: ${{ matrix.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release assets
        run: |
          bun run app:clean
          bun run app:build
          bun run bundle:verify

      - name: Package standalone artifact
        run: |
          bun run release:package -- --version "${{ needs.prepare_release.outputs.release_tag }}" --output-root "dist/release" --target "${{ matrix.compileTarget }}"

      - name: Smoke test packaged artifact
        run: |
          bun run release:smoke -- --artifact-path "dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.tar.gz"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platformTarget }}
          path: |
            dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.tar.gz
            dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.tar.gz.sha256
            dist/release/trenchclaw-${{ needs.prepare_release.outputs.release_tag }}-${{ matrix.platformTarget }}.release-metadata.json

  publish:
    needs:
      - prepare_release
      - build_release
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          name: ${{ needs.prepare_release.outputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare_release.outputs.prerelease }}
          files: |
            dist/release/*.tar.gz
            dist/release/*.sha256
            dist/release/*.release-metadata.json
