configVersion: 1

rpc:
  primaryRpc: helius
  providers:
    helius:
      endpointRef: vault://rpc/helius/http-url
      wsEndpointRef: vault://rpc/helius/ws-url
      apiKeyRef: vault://rpc/helius/api-key

trading:
  swapSettings: swaps.yaml
  preferredSwap: ultra
  defaultSwapProfile: ultra
  slippagePresetBps: ultra-managed
  futureSwapAction: scheduleManagedUltraSwap
  sizing:
    maxTradeSize: 1 #sol
    maxTradesPerHour: 10


wallet:
  activeWalletRef: ""
  signerRef: ""

integrations:
  dexscreenerApiKeyRef: vault://integrations/dexscreener/api-key
  jupiterApiKeyRef: vault://integrations/jupiter/api-key

notifications:
  config: notifications.yaml
