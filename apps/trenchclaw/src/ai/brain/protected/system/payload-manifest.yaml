version: 1
defaults:
  mode: operator
  includeKnowledgeManifest: true
  includeKnowledgeDirectoryTreeFallback: true
  includeWorkspaceDirectoryTree: true
modes:
  operator:
    title: Operator Mode
    sections:
      - kind: file
        title: Core System Prompt
        path: system.md
      - kind: file
        title: Operator Mode Instructions
        path: modes/operator.md
      - kind: generated
        title: Runtime Capability Appendix
        source: runtimeCapabilityAppendix
      - kind: file
        title: Workspace Context Snapshot
        path: ../context/workspace-and-schema.md
      - kind: generated
        title: Knowledge Manifest
        source: knowledgeManifest
        fallbackSource: knowledgeDirectoryTree
      - kind: generated
        title: Workspace Directory Tree
        source: workspaceDirectoryTree
      - kind: generated
        title: Filesystem Policy
        source: filesystemPolicy
      - kind: generated
        title: Resolved User Settings
        source: resolvedUserSettings
